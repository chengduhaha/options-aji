<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OptionsAji — Wireframe Explorations</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; font-family: 'Caveat', cursive; }

  /* Wireframe sketch style */
  .wf { font-family: 'Caveat', cursive; }
  .wf-box {
    border: 2px solid #555;
    background: #2a2a2a;
    border-radius: 3px;
  }
  .wf-box.dark { background: #1e1e1e; border-color: #444; }
  .wf-box.accent { background: #2d2a1a; border-color: #8a7a30; }
  .wf-box.gold { background: #8a7a30; border: none; }
  .wf-box.green { background: #1a3a30; border-color: #2a6a55; }
  .wf-box.muted { background: #252525; border-color: #3a3a3a; }
  .wf-label {
    font-family: 'Caveat', cursive;
    color: #888;
    font-size: 11px;
  }
  .wf-title {
    font-family: 'Caveat', cursive;
    color: #ccc;
    font-weight: 700;
  }
  .wf-gold { color: #c9a93a; }
  .wf-green { color: #3abf9a; }
  .wf-muted { color: #666; }
  .wf-text { color: #aaa; font-size: 13px; }
  .wf-tag {
    display: inline-block;
    background: #333;
    border: 1px solid #555;
    border-radius: 2px;
    padding: 1px 5px;
    font-size: 10px;
    color: #888;
  }
  .sketch-line {
    border: none;
    border-top: 1.5px solid #444;
    margin: 6px 0;
  }
  .wf-nav { display: flex; align-items: center; gap: 8px; }
  .wf-btn {
    display: inline-block;
    padding: 5px 12px;
    border-radius: 3px;
    font-family: 'Caveat', cursive;
    font-size: 13px;
    font-weight: 700;
    cursor: default;
  }
  .wf-btn.primary { background: #8a7a30; color: #fff; border: none; }
  .wf-btn.outline { background: transparent; color: #888; border: 1.5px solid #555; }
  .wf-chat-bubble {
    border-radius: 8px 8px 8px 2px;
    padding: 5px 8px;
    font-size: 11px;
    max-width: 80%;
  }
  .wf-chat-bubble.user {
    background: #2a2a3a;
    border: 1px solid #444;
    color: #aaa;
    border-radius: 8px 8px 2px 8px;
    margin-left: auto;
  }
  .wf-chat-bubble.ai {
    background: #1e2e28;
    border: 1px solid #2a5a45;
    color: #6abf9a;
  }
  .bar {
    display: flex; align-items: flex-end; gap: 2px;
  }
  .bar-col { width: 8px; background: #3a3a3a; border-radius: 1px 1px 0 0; }
  .bar-col.pos { background: #2a6a55; }
  .bar-col.neg { background: #6a2a2a; }
  .zigzag { font-size: 9px; color: #555; letter-spacing: -1px; }
  
  /* annotation arrow style */
  .ann {
    font-size: 11px;
    color: #666;
    font-style: italic;
    font-family: 'Caveat', cursive;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ─── Direction A: Terminal-First ─── */
function WireA() {
  return (
    <div className="wf" style={{width: 720, fontSize: 13, color: '#aaa'}}>

          <span className="wf-btn primary" style={{fontSize:11, marginLeft:4}}>免费开始</span>

      {/* Hero — full-width terminal grid */}

          {/* Left */}

            <div className="wf-title" style={{fontSize:26, lineHeight:1.2, marginBottom:6}}>
              AI 驱动的<br/>
              <span className="wf-gold">美股期权</span><br/>
              决策引擎
            </div>
            <div style={{fontSize:11, color:'#666', marginBottom:4, fontFamily:'Space Mono,monospace'}}>
              Real-time GEX · AI Q&A · Smart Signals

            <div className="sketch-line"/>
            <div className="wf-text" style={{fontSize:12, marginBottom:16}}>

            <div style={{display:'flex', gap:8, marginBottom:12}}>

            {/* Trust badges */}
            <div style={{display:'flex', gap:16, marginTop:8}}>

          </div>
          {/* Right — dashboard preview grid */}
          <div style={{padding:'12px', background:'#161616', display:'grid', gridTemplateRows:'auto auto', gap:6}}>
            {/* GEX chart mini */}
            <div className="wf-box" style={{padding:'8px', height:90}}>
              <div className="wf-label" style={{marginBottom:4}}>GEX Chart — SPY</div>

            <div className="wf-label">功能列表占位</div>
            <div className="wf-label" style={{marginTop:3}}>功能列表占位</div>
            <div className="wf-label" style={{marginTop:3}}>功能列表占位</div>
          </div>

      {/* Footer note */}
      <div className="ann" style={{textAlign:'center', padding:'8px', color:'#444'}}>
        → Direction A: Terminal-First — dense data grid, Bloomberg aesthetic, dashboard-in-hero
      </div>
    </div>

/* ─── Direction B: Cinematic SaaS ─── */

/* ─── Direction C: Split-Screen Asymmetric ─── */
function WireC() {
  return (
    <div className="wf" style={{width: 720, fontSize: 13, color: '#aaa'}}>
      {/* Sticky nav */}
